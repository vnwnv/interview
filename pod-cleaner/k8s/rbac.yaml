# RBAC configuration for Pod Cleaner
# Grants necessary permissions to list, get, and patch Kubernetes resources

apiVersion: v1
kind: Namespace
metadata:
  name: pod-cleaner
  labels:
    app: pod-cleaner

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-cleaner
  namespace: pod-cleaner
  labels:
    app: pod-cleaner

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-cleaner
  labels:
    app: pod-cleaner
rules:
  # List namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
  
  # List and get pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get"]
  
  # List and get replicasets (to trace pod ownership)
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["list", "get"]
  
  # Get and patch deployments (for rollout restart)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  
  # Get and patch statefulsets (for rollout restart)
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-cleaner
  labels:
    app: pod-cleaner
subjects:
  - kind: ServiceAccount
    name: pod-cleaner
    namespace: pod-cleaner
roleRef:
  kind: ClusterRole
  name: pod-cleaner
  apiGroup: rbac.authorization.k8s.io
